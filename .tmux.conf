# ==========================================
# 1. 基础设置 (General Settings)
# ==========================================
set -g prefix C-q              # 修改前缀键为 Ctrl-a
unbind C-b
bind C-a send-prefix

set -g base-index 1            # 窗口编号从 1 开始
setw -g pane-base-index 1       # 面板编号从 1 开始
set -g renumber-windows on      # 关闭窗口后重新编号
set -g mouse on                 # 开启鼠标支持
set -g status-position top      # 状态栏置顶
set -g default-terminal "tmux-256color" # 更好的色彩支持
set -as terminal-overrides ',xterm*:Tc' # 开启真彩色支持
set -g default-shell "/opt/homebrew/bin/zsh"
set -ga update-environment "PATH"

# ==========================================
# 2. 快捷键重映射 (Key Bindings)
# ==========================================
# 快速重载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 面板分割 (保持当前路径)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim 风格面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整面板大小 (-r 表示可重复按键)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# 复制模式使用 vi 键位
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ==========================================
# 3. 插件列表 (TPM Plugins)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.2' # 使用稳定的主题版本
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'

# ==========================================
# 4. 主题配置 (Catppuccin Theme Config)
# ==========================================
set -g @catppuccin_flavor 'mocha'      # 主题色调
set -g @catppuccin_window_status_style "round" # 圆角窗口标签
set -g @catppuccin_status_background "default" # 状态栏背景透明

# 自定义状态栏左侧显示
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"

# 自定义状态栏右侧显示 (按顺序堆叠模块)
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ==========================================
# 5. 初始化 TPM (必须放在最后一行)
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
