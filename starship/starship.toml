"$schema" = 'https://starship.rs/config-schema.json'

# Catppuccin Mocha palette:
# Flamingo #F2CDCD  Mauve #CBA6F7  Pink #F38BA8
# Blue #89B4FA  Green #A6E3A1  Yellow #F9E2AF
# Cyan #89DCEB  Red #F38BA8  Peach #FAB387

format = """
$username$hostname$directory$git_branch$git_status$golang$nodejs$rust$python$docker_context$cmd_duration
$character"""

right_format = """$kubernetes$time"""

[character]
success_symbol = "[❯](bold #A6E3A1)"
error_symbol = "[❯](bold #F38BA8)"
vimcmd_symbol = "[❮](bold #F9E2AF)"

[username]
style_user = "bold #F2CDCD"
style_root = "bold #F38BA8"
format = "[$user]($style)"
show_always = true

[hostname]
ssh_only = false
format = "[@$hostname](bold #F2CDCD) "

[directory]
style = "bold #89B4FA"
truncation_length = 4
truncate_to_repo = true
read_only = " 🔒"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
format = "on [$symbol$branch(:$remote_branch)](bold #CBA6F7) "
truncation_length = 30
truncation_symbol = "…"

[git_status]
format = '([$all_status$ahead_behind](bold #F9E2AF) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?"
stashed = "≡"
modified = "!"
staged = "+"
renamed = "»"
deleted = "✘"

[golang]
symbol = " "
format = "via [$symbol($version)](dimmed #89DCEB) "

[nodejs]
symbol = " "
format = "via [$symbol($version)](dimmed #A6E3A1) "

[rust]
symbol = " "
format = "via [$symbol($version)](dimmed #FAB387) "

[python]
symbol = " "
format = "via [$symbol($version)](dimmed #F9E2AF) "

[docker_context]
symbol = " "
only_with_files = true
format = "via [$symbol$context](dimmed #89B4FA) "

[cmd_duration]
min_time = 2_000
format = "took [$duration](bold #F9E2AF) "

[kubernetes]
disabled = false
symbol = "☸ "
format = '[$symbol$context(\($namespace\))](bold #89DCEB)  '
contexts = [
  { context_pattern = "orbstack", style = "dimmed #89DCEB", symbol = "☸ " },
]

[time]
disabled = false
format = "[$time](#585B70)"
time_format = "%H:%M:%S"
