"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 800
scan_timeout = 30
palette = "macconfig"

format = """
$username$hostname\
$shell\
$directory\
$git_branch\
$git_status\
$golang\
$rust\
$nodejs\
$bun\
$docker_context\
$cmd_duration\
$line_break\
$character\
"""

right_format = """$time"""

[palettes.macconfig]
rosewater = "#f4dbd6"
peach = "#f5a97f"
yellow = "#eed49f"
green = "#a6da95"
teal = "#8bd5ca"
sapphire = "#7dc4e4"
text = "#cad3f5"
subtext = "#b8c0e0"
overlay = "#939ab7"
surface = "#494d64"
red = "#ed8796"

[shell]
disabled = false
format = "[$indicator]($style) "
fish_indicator = "fish"
style = "bold subtext"

[username]
style_user = "bold rosewater"
style_root = "bold red"
format = "[$user]($style)"
show_always = false

[hostname]
ssh_only = false
format = "[@$hostname](bold rosewater) "

[directory]
style = "bold yellow"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
fish_style_pwd_dir_length = 1
truncate_to_repo = false
read_only = " ro"
read_only_style = "bold red"

[git_branch]
format = "[$branch]($style) "
style = "bold peach"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold red"

[golang]
format = "[go $version]($style) "
style = "bold sapphire"

[rust]
format = "[rs $version]($style) "
style = "bold peach"

[nodejs]
format = "[node $version]($style) "
style = "bold green"

[bun]
format = "[bun $version]($style) "
style = "bold green"

[docker_context]
format = "[docker $context]($style) "
style = "bold teal"

[kubernetes]
disabled = true

[cmd_duration]
min_time = 500
format = "[took $duration]($style) "
style = "bold overlay"

[character]
success_symbol = "[>](bold yellow)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold yellow)"
vimcmd_replace_one_symbol = "[<](bold peach)"
vimcmd_replace_symbol = "[<](bold peach)"
vimcmd_visual_symbol = "[<](bold teal)"

[time]
disabled = false
format = "[$time](bold overlay)"
time_format = "%H:%M:%S"
