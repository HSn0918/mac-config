# ==========================================
# 1. 基础设置 (General Settings)
# ==========================================
set -g prefix C-q
unbind C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-position top
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc'
set -g default-shell "/opt/homebrew/bin/fish"
set -ga update-environment "PATH"

set -g escape-time 0
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard on

# ==========================================
# 2. 快捷键重映射 (Key Bindings)
# ==========================================
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# 面板分割 (保持当前路径)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新建窗口 (保持当前路径)
bind c new-window -c "#{pane_current_path}"

# Vim 风格面板切换
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 调整面板大小 (-r 表示可重复按键)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Alt+数字 直接切窗口 (无需 prefix)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Tab 切换上一个窗口
bind Tab last-window

# fzf 搜索所有窗口 (跨 session)
bind f display-popup -E "tmux list-windows -a -F '#{session_name}:#{window_index} #{window_name}' | fzf --height=40% --layout=reverse | cut -d' ' -f1 | xargs tmux switch-client -t"

# fzf 切换 session
bind S display-popup -E "tmux list-sessions -F '#{session_name}' | fzf --height=40% --layout=reverse | xargs tmux switch-client -t"

# 新建命名 session
bind C-s command-prompt -p "New session:" "new-session -s '%%'"

# 标记 pane / 跳转标记
bind m select-pane -m
bind M select-pane -M

# 复制模式 vi 键位
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# ==========================================
# 3. 插件列表 (TPM Plugins)
# ==========================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.2'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# ==========================================
# 4. 插件配置
# ==========================================
# Session 持久化
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Catppuccin 主题
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "round"
set -g @catppuccin_status_background "default"

# 自定义状态栏左侧显示
set -g status-left-length 100
set -g status-left ""
set -ag status-left "#{E:@catppuccin_status_session}"

# 自定义状态栏右侧显示
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_directory}"
set -ag status-right "#{E:@catppuccin_status_uptime}"

# ==========================================
# 5. 初始化 TPM (必须放在最后一行)
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
